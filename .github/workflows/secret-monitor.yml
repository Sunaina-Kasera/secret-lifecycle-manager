name: Secret Lifecycle Manager

on:
  schedule:
    - cron: '0 3 * * *'  # roz raat 3 baje IST (UTC 9:30 - 6:30 = 3:00)
  workflow_dispatch:       # manually bhi trigger kar sako

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Configure AWS CLI
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Make scripts executable
        run: |
          chmod +x modules/brain.sh
          chmod +x modules/git_scanner.sh
          chmod +x modules/expiry_watcher.sh
          chmod +x modules/auto_rotator.sh
          chmod +x modules/alert_engine.sh

      - name: Run Git Scanner
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: bash modules/git_scanner.sh

      - name: Run Expiry Watcher
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: bash modules/expiry_watcher.sh

      - name: Run Central Brain
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: bash modules/brain.sh

      - name: Run Auto Rotator
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: bash modules/auto_rotator.sh

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: brain-logs
          path: logs/brain.log
